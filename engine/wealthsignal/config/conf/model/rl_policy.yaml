# @package model
#
# Customer-R1 adaptation: SFT + GRPO policy built on Phi-3-mini with 4-bit QLoRA.
# See arXiv:2510.07230 for the reference method.

name: rl_policy
_target_: engine.wealthsignal.models.rl_policy.CustomerR1Policy

base_model_id: microsoft/phi-3-mini-4k-instruct
max_context_length: 4096

sft:
  learning_rate: 2.0e-4
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4

rl:
  algorithm: grpo
  learning_rate: 1.0e-6
  num_iterations: 200
  rollouts_per_update: 16
  kl_penalty: 0.05
  reward_weights:
    action_correctness: 0.5
    completion_progress: 0.3
    offer_acceptance: 0.2

qlora:
  bits: 4
  quant_type: nf4
  double_quant: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
