# @package training
num_epochs: 30
batch_size: 256
num_workers: 4

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-3
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  T_max: ${training.num_epochs}
  eta_min: 1.0e-6

gradient_clip_val: 1.0

early_stopping:
  enabled: true
  patience: 5
  min_delta: 1.0e-4
  monitor: val_loss
  mode: min

checkpoint:
  save_top_k: 3
  monitor: val_${model.metric.primary}
  mode: max
