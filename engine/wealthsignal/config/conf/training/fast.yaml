# @package training
# Quick iteration config — small epochs, no checkpointing, aggressive LR.
num_epochs: 3
batch_size: 128
num_workers: 2

optimizer:
  _target_: torch.optim.AdamW
  lr: 3.0e-3
  weight_decay: 0.0

scheduler: null

gradient_clip_val: 1.0

early_stopping:
  enabled: false

checkpoint:
  save_top_k: 0
