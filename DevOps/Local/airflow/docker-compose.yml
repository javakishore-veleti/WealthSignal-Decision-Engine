# Apache Airflow 2.9 — LocalExecutor flavour for single-node local development.
# All PyTorch training DAGs run inside these containers (no compute on the
# middleware tier). Metadata DB is the shared Postgres instance.

name: wealthsignal-airflow

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://wealthsignal:wealthsignal@postgres:5432/wealthsignal
    AIRFLOW__CORE__SQL_ALCHEMY_SCHEMA: airflow
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY:-local-development-secret}"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    PYTHONPATH: /opt/airflow/dags:/opt/airflow/plugins:/opt/airflow/engine
    # Engine package mounted into the container so DAGs can `import engine.wealthsignal`.
    _PIP_ADDITIONAL_REQUIREMENTS: "mlflow==2.13.* torch==2.3.* great-expectations==0.18.* apache-airflow-providers-postgres==5.11.*"
    # Pre-configured connection used by dags/ingestion/load_product_catalog.py.
    AIRFLOW_CONN_WEALTHSIGNAL_POSTGRES: "postgresql+psycopg2://wealthsignal:wealthsignal@postgres:5432/wealthsignal"

  volumes:
    - ../../../airflow/dags:/opt/airflow/dags
    - ../../../airflow/plugins:/opt/airflow/plugins
    - ../../../airflow/config:/opt/airflow/config
    - ../../../engine:/opt/airflow/engine
    - ../../../data:/opt/airflow/data:ro
    - ws-airflow-logs:/opt/airflow/logs

  networks:
    - wealthsignal-net

  depends_on:
    airflow-init:
      condition: service_completed_successfully

services:
  # One-shot init: migrate DB and create the admin user.
  airflow-init:
    <<: *airflow-common
    container_name: ws-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --role Admin --username admin --password admin \
          --firstname Kishore --lastname Veleti --email admin@wealthsignal.local || true
    depends_on: {}

  airflow-webserver:
    <<: *airflow-common
    container_name: ws-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: ws-airflow-scheduler
    command: scheduler
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    container_name: ws-airflow-triggerer
    command: triggerer
    restart: unless-stopped

volumes:
  ws-airflow-logs:
    name: ws-airflow-logs

networks:
  wealthsignal-net:
    external: true
    name: wealthsignal-net
