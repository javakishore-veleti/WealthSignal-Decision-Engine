# Observability stack — Prometheus + Grafana (metrics) and Elasticsearch +
# Kibana (logs). MLflow lives in its own stack at DevOps/Local/mlflow/ —
# experiment tracking is an ML-lifecycle concern, not ops observability.
# All services attach to the shared 'wealthsignal-net' network.

name: wealthsignal-observability

services:
  # ── Metrics ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: ws-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./Prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ws-prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - wealthsignal-net

  grafana:
    image: grafana/grafana:10.4.3
    container_name: ws-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ws-grafana-data:/var/lib/grafana
      - ./Grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - wealthsignal-net

  # ── Logs ───────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ws-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - ws-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - wealthsignal-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: ws-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - wealthsignal-net

volumes:
  ws-prometheus-data:
    name: ws-prometheus-data
  ws-grafana-data:
    name: ws-grafana-data
  ws-es-data:
    name: ws-es-data

networks:
  wealthsignal-net:
    external: true
    name: wealthsignal-net
