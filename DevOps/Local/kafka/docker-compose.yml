# Kafka 3.7 in KRaft (no Zookeeper) mode — single broker for local development.
# Used as the event bus between middleware services (async job events, drift
# alerts, audit logs). Matches the architecture described in CONTRIBUTING.md.

name: wealthsignal-kafka

services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: ws-kafka
    hostname: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"   # plaintext
      - "9094:9094"   # external (for host-network clients)

    environment:
      # KRaft mode (no Zookeeper).
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - ws-kafka-data:/bitnami/kafka

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

    networks:
      - wealthsignal-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ws-kafka-ui
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wealthsignal-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - wealthsignal-net

volumes:
  ws-kafka-data:
    name: ws-kafka-data

networks:
  wealthsignal-net:
    external: true
    name: wealthsignal-net
