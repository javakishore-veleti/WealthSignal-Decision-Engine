# Alembic configuration for the WealthSignal monorepo.
#
# The database URL is NOT hardcoded here — env.py reads it from the
# WEALTHSIGNAL_DB_URL environment variable so the same migrations run
# unchanged against local Postgres, AWS RDS, Azure Postgres, or GCP Cloud SQL.

[alembic]
# Path to the migration scripts relative to this file.
script_location = alembic

# Template for new migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Single-database setup. Switch to multi-database later if each service gets its own DB.
# sqlalchemy.url is intentionally left blank — populated by env.py from env var.

[post_write_hooks]
# Auto-format new migrations with black + ruff on generation.
hooks = black, ruff
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
