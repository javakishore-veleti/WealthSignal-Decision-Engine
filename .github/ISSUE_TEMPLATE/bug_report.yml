name: Bug Report
description: Report a bug or unexpected behaviour
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - middleware/admin_api
        - middleware/customer_api
        - middleware/data_management_api
        - portals/admin_portal
        - portals/customer_portal
        - airflow/dags
        - engine/wealthsignal — form classifier
        - engine/wealthsignal — customer segmentation
        - engine/wealthsignal — sequence model
        - engine/wealthsignal — RL policy
        - engine/wealthsignal — MLflow / tracking
        - engine/wealthsignal — data pipeline
        - CI / tooling
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: "v0.1.0 or commit 872e21b"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / MLflow run URL / Airflow task log
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Python 3.11, PyTorch 2.3, macOS 14 / Ubuntu 22.04, CPU / CUDA 12.1"

  - type: checkboxes
    id: compliance
    attributes:
      label: Compliance
      options:
        - label: This report contains no PII or customer data.
          required: true
